<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">NTE Flowboard 的周期性清单流程</title>
  <desc id="desc">选择服务器、完成清单、在周期重置后继续下一轮；本地数据可选同步至 Supabase。</desc>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#9080f0"/><stop offset="1" stop-color="#15a0b8"/></linearGradient>
  </defs>
  <rect width="1200" height="320" rx="26" fill="#101018"/>
  <text x="58" y="65" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="32" font-weight="700">围绕重置时间组织每一轮事项</text>
  <text x="58" y="96" fill="#ffffffa6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="18">每次完成、隐藏、调整顺序或编辑标签，都会先写入当前浏览器。</text>
  <path d="M248 196H362M544 196H658M840 196H954" stroke="url(#line)" stroke-width="3" stroke-linecap="round"/>
  <path d="M354 189l12 7-12 7M650 189l12 7-12 7M946 189l12 7-12 7" fill="none" stroke="#77bdd1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(58 137)">
    <rect width="190" height="120" rx="18" fill="#ffffff0d" stroke="#ffffff26"/>
    <text x="22" y="38" fill="#a79af8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700">01 · REGION</text>
    <text x="22" y="70" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="22" font-weight="650">选择服务器</text>
    <text x="22" y="98" fill="#ffffffa6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="16">亚太 / 美服 / 欧服</text>
  </g>
  <g transform="translate(362 137)">
    <rect width="182" height="120" rx="18" fill="#ffffff0d" stroke="#ffffff26"/>
    <text x="22" y="38" fill="#65c8d6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700">02 · LIST</text>
    <text x="22" y="70" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="22" font-weight="650">管理事项</text>
    <text x="22" y="98" fill="#ffffffa6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="16">勾选、标签、排序</text>
  </g>
  <g transform="translate(658 137)">
    <rect width="182" height="120" rx="18" fill="#ffffff0d" stroke="#ffffff26"/>
    <text x="22" y="38" fill="#e9bb66" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700">03 · RESET</text>
    <text x="22" y="70" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="22" font-weight="650">等待重置</text>
    <text x="22" y="98" fill="#ffffffa6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="16">日 / 周 / 月周期</text>
  </g>
  <g transform="translate(954 137)">
    <rect width="188" height="120" rx="18" fill="#9080f01f" stroke="#9080f066"/>
    <text x="22" y="38" fill="#c5bcff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700">04 · CONTINUE</text>
    <text x="22" y="70" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="22" font-weight="650">进入下一轮</text>
    <text x="22" y="98" fill="#ffffffa6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="16">可选同步到设备</text>
  </g>
</svg>
